<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Chalet Bar — Carte des Boissons</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold:#B8922A;--gold-l:#D4AC50;--gold-d:#8A6B1F;
  --dark:#1C130A;--dark2:#241A0C;
  --cream:#F4ECD8;--cream2:#E8D9BB;--cream3:#D9C89E;
  --muted:#8A7355;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--dark);color:var(--cream);font-family:'EB Garamond',serif;min-height:100vh}

/* Loading */
#loading{position:fixed;inset:0;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;gap:16px;transition:opacity 0.4s}
#loading.hidden{opacity:0;pointer-events:none}
.loader{width:36px;height:36px;border:2px solid rgba(184,146,42,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.3em;color:var(--gold-d);text-transform:uppercase}

.page{max-width:700px;margin:0 auto;padding:40px 20px 60px}

/* Header */
.header{text-align:center;padding:48px 20px 36px;border-bottom:1px solid rgba(184,146,42,0.2);margin-bottom:40px}
.header-logo{margin:0 auto 18px}
.header-name{font-family:'Cinzel',serif;font-size:clamp(2rem,7vw,3rem);letter-spacing:0.2em;color:var(--gold-l);line-height:1}
.header-bar{font-family:'Cinzel',serif;font-size:8px;letter-spacing:0.6em;color:var(--gold);margin-top:6px;text-transform:uppercase}
.header-rule{width:80px;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);margin:14px auto}

/* Section */
.sec{text-align:center;margin:32px 0 14px;position:relative}
.sec-line{position:absolute;top:50%;left:0;right:0;height:0.5px;background:rgba(184,146,42,0.3)}
.sec-title{font-family:'Cinzel',serif;font-size:8px;letter-spacing:0.35em;color:var(--gold);background:var(--dark);padding:0 12px;position:relative;z-index:1;text-transform:uppercase}

/* Items */
.item{display:flex;justify-content:space-between;align-items:baseline;padding:8px 0;border-bottom:0.5px solid rgba(184,146,42,0.1);gap:12px;transition:background 0.15s}
.item:hover{background:rgba(184,146,42,0.04);border-radius:3px;padding-left:6px;padding-right:6px}
.item-name{font-size:15px;color:var(--cream);flex:1;line-height:1.3}
.item-name.star::after{content:'★';color:var(--gold);font-size:11px;margin-left:6px}
.item-desc{font-size:11px;color:var(--muted);font-style:italic;margin-top:2px}
.price{font-family:'Playfair Display',serif;font-size:14px;color:var(--gold-l);white-space:nowrap;text-align:right}
.price-alt{font-size:11px;color:var(--muted);display:block}

/* Double prix */
.col-header{display:flex;justify-content:flex-end;gap:20px;margin-bottom:6px;border-bottom:0.5px solid rgba(184,146,42,0.15);padding-bottom:5px}
.col-header span{font-family:'Cinzel',serif;font-size:7px;letter-spacing:0.2em;color:var(--gold-d);min-width:52px;text-align:center}
.prices2{display:flex;gap:20px}
.prices2 span{font-family:'Playfair Display',serif;font-size:14px;color:var(--gold-l);min-width:52px;text-align:center}
.prices2 .ardoise{font-family:'EB Garamond',serif;font-style:italic;font-size:11px;color:var(--muted)}

/* Sub label */
.sub-label{font-size:10px;color:var(--gold-d);font-style:italic;margin:14px 0 5px}

/* Vins */
.vin-rouge{color:#C08080;font-style:italic;font-size:12px}
.vin-blanc{color:#D4C078;font-style:italic;font-size:12px}
.vin-rose{color:#D4A090;font-style:italic;font-size:12px}

/* Grid 2 col alcools */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 24px}
@media(max-width:480px){.grid2{grid-template-columns:1fr}}

/* Formule */
.formule{border:0.5px solid rgba(184,146,42,0.4);border-radius:6px;padding:14px 18px;margin:8px 0;display:flex;justify-content:space-between;align-items:center;gap:12px;transition:background 0.15s}
.formule:hover{background:rgba(184,146,42,0.06)}
.formule-name{font-family:'Playfair Display',serif;font-style:italic;font-size:16px;color:var(--gold-l)}
.formule-detail{font-size:11px;color:var(--muted);font-style:italic;margin-top:3px}
.formule-price{font-family:'Cinzel',serif;font-size:18px;color:var(--gold);white-space:nowrap}

/* Ardoise */
.ardoise-note{text-align:center;border:0.5px dashed rgba(184,146,42,0.3);border-radius:4px;padding:10px;font-style:italic;font-size:13px;color:var(--muted);margin:8px 0}

/* Divider */
.hr{height:0.5px;background:linear-gradient(to right,transparent,rgba(184,146,42,0.25),transparent);margin:28px 0}

/* Footer */
.footer{text-align:center;margin-top:40px;padding-top:24px;border-top:1px solid rgba(184,146,42,0.2)}
.footer p{font-size:11px;color:var(--muted);font-style:italic;line-height:2}
.last-update{font-size:10px;color:rgba(184,146,42,0.3);margin-top:12px}
</style>
</head>
<body>

<div id="loading">
  <div class="loader"></div>
  <div class="loader-text">Chargement de la carte…</div>
</div>

<div class="page" id="carte" style="opacity:0;transition:opacity 0.4s"></div>

<script>
const REPO   = 'DarkUltraPSP/lechaletcarteboissons';
const BRANCH = 'main';
const RAW    = `https://raw.githubusercontent.com/${REPO}/${BRANCH}/menu.json`;

function fmt(p){
  if(p===null||p===undefined) return '<span class="ardoise">ardoise</span>';
  return parseFloat(p).toFixed(2).replace('.',',')+'\u00a0€';
}

function sec(label){
  return `<div class="sec"><div class="sec-line"></div><span class="sec-title">${label}</span></div>`;
}

function item(name, priceHtml, desc='', extra=''){
  return `<div class="item ${extra}">
    <div class="item-name ${extra}">${name}${desc?`<div class="item-desc">${desc}</div>`:''}
    </div>
    <div class="price">${priceHtml}</div>
  </div>`;
}

function hr(){ return '<div class="hr"></div>'; }

function render(D){
  let h = '';

  // Header
  h += `<div class="header">
    <svg class="header-logo" width="80" height="56" viewBox="0 0 160 110" fill="none">
      <path d="M80 8A72 72 0 0 1 152 80" stroke="#B8922A" stroke-width="1.5" fill="none"/>
      <path d="M8 80A72 72 0 0 1 80 8" stroke="#B8922A" stroke-width="1.5" fill="none"/>
      <path d="M8 80A72 72 0 0 0 152 80" stroke="#B8922A" stroke-width="1.5" fill="none"/>
      <polyline points="10,75 35,38 52,55 80,18 108,55 125,38 150,75" stroke="#C9A84C" stroke-width="1.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
      <polyline points="48,92 80,65 112,92" stroke="#C9A84C" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
    </svg>
    <div class="header-name">Le Chalet</div>
    <div class="header-bar">Bar</div>
    <div class="header-rule"></div>
  </div>`;

  // Fraiches
  h += sec('Boissons Fraiches');
  D.fraiches.subsections.forEach(sub => {
    h += `<div class="sub-label">${sub.label}</div>`;
    sub.items.filter(i=>i.active).forEach(i => { h += item(i.name, fmt(i.price)); });
  });
  if(D.fraiches.jus.active)    h += item(D.fraiches.jus.label,    fmt(D.fraiches.jus.price),    D.fraiches.jus.flavours.join(' · '));
  if(D.fraiches.sirop.active)  h += item(D.fraiches.sirop.label,  fmt(D.fraiches.sirop.price),  D.fraiches.sirop.flavours.join(' · '));
  if(D.fraiches.diabolo.active)h += item(D.fraiches.diabolo.label,fmt(D.fraiches.diabolo.price),D.fraiches.diabolo.flavours.join(' · '));

  // Pression
  h += hr() + sec('Bières Pression');
  h += `<div class="col-header"><span>25 cl</span><span>50 cl</span></div>`;
  D.pression.items.filter(i=>i.active).forEach(i => {
    h += `<div class="item">
      <div class="item-name${i.star?' star':''}">${i.name}</div>
      <div class="prices2">
        <span>${fmt(i.price25)}</span>
        <span>${i.special && !i.price50 ? '' : fmt(i.price50)}</span>
      </div>
    </div>`;
  });

  // Bouteilles
  h += hr() + sec('Bières Bouteilles');
  D.bouteilles.items.filter(i=>i.active).forEach(i => { h += item(i.name, fmt(i.price), '', i.star?'star':''); });

  // Vins
  h += hr() + sec('Les Vins');
  h += `<div class="col-header"><span>12 cl</span><span>Bouteille</span></div>`;
  const tc = {Rouge:'vin-rouge',Blanc:'vin-blanc','Rosé':'vin-rose'};
  D.vins.items.filter(i=>i.active).forEach(i => {
    h += `<div class="item">
      <div class="item-name">${i.name} <span class="${tc[i.type]||''}">${i.type}</span></div>
      <div class="prices2"><span>${fmt(i.price12)}</span><span>${fmt(i.priceBt)}</span></div>
    </div>`;
  });

  // Aperitifs
  h += hr() + sec('Apéritifs');
  D.aperitifs.items.filter(i=>i.active).forEach(i => {
    h += item(i.name, fmt(i.price), i.flavours ? i.flavours.join(' · ') : (i.desc||''));
  });

  // Alcools
  h += hr() + sec('Alcools &amp; Digestifs');
  const als = D.alcools.items.filter(i=>i.active);
  const half = Math.ceil(als.length/2);
  h += `<div class="grid2">
    <div>${als.slice(0,half).map(i=>item(i.name,fmt(i.price))).join('')}</div>
    <div>${als.slice(half).map(i=>item(i.name,fmt(i.price))).join('')}</div>
  </div>`;

  // Chaud
  const chauds = D.chaud.items.filter(i=>i.active);
  if(chauds.length){ h += hr()+sec('Boissons Chaudes'); chauds.forEach(i=>{h+=item(i.name,fmt(i.price));}); }

  // Faims
  const faims = D.faims.items.filter(i=>i.active);
  if(faims.length){ h += hr()+sec('Petites Faims'); faims.forEach(i=>{h+=item(i.name,fmt(i.price),i.desc||'',i.star?'star':'');}); }

  // Cocktails
  h += `<div style="margin-top:24px"></div>${sec('Cocktails &amp; Shooters')}<div class="ardoise-note">Voir l'ardoise du moment</div>`;

  // Formules
  const fos = D.formules.items.filter(i=>i.active);
  if(fos.length){
    h += hr()+sec('Nos Formules');
    fos.forEach(i=>{
      h+=`<div class="formule">
        <div><div class="formule-name">${i.name}</div><div class="formule-detail">${i.desc||''}</div></div>
        <div class="formule-price">${fmt(i.price)}</div>
      </div>`;
    });
  }

  // Footer
  h += `<div class="footer">
    <p>Prix nets, service compris</p>
    <p>L'abus d'alcool est dangereux pour la santé<br>À consommer avec modération</p>
    <div class="last-update" id="last-update"></div>
  </div>`;

  document.getElementById('carte').innerHTML = h;
  document.getElementById('last-update').textContent = 'Dernière mise à jour : ' + new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});
}

async function load(){
  try {
    const res = await fetch(RAW + '?t=' + Date.now());
    if(!res.ok) throw new Error('fetch failed');
    const D = await res.json();
    render(D);
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('carte').style.opacity = '1';
  } catch(e) {
    document.getElementById('loading').innerHTML = `<div style="text-align:center;color:#8A7355;font-family:'Cinzel',serif;font-size:11px;letter-spacing:0.2em">ERREUR DE CHARGEMENT<br><span style="font-size:9px;opacity:0.6;margin-top:8px;display:block">Veuillez réessayer</span></div>`;
  }
}

load();
</script>
</body>
</html>
