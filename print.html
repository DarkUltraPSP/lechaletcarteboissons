<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; connect-src https://chalet-bar-api.lechaletbar.workers.dev https://raw.githubusercontent.com; font-src https://fonts.gstatic.com; img-src 'self' data:">
<title>Le Chalet Bar — Carte à imprimer</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════
   VARIABLES
═══════════════════════════════ */
:root{
  --gold:#2D6E46;--gold-l:#4A9062;--gold-d:#1A5230;
  --dark:#1C130A;--dark2:#241A0C;--dark3:#2F2010;
  --cream:#F4ECD8;--cream2:#E8D9BB;--muted:#8A7355;
  --body-bg:#2a2a2a;
}
[data-theme="light"]{
  --dark:#EDE3CC;--dark2:#FDF6E8;--dark3:#F5EDD8;
  --cream:#2C1A08;--cream2:#3D2810;--muted:#7A5230;
  --body-bg:#d8cdb8;
}

/* ═══════════════════════════════
   ÉCRAN — barre de contrôle
═══════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:var(--body-bg);
  font-family:'EB Garamond',serif;
  transition:background 0.3s;
}

/* Barre du haut — masquée à l'impression */
#toolbar{
  background:#1a1a1a;
  padding:12px 24px;
  display:flex;
  align-items:center;
  gap:16px;
  position:sticky;
  top:0;
  z-index:100;
  border-bottom:1px solid #333;
}
#toolbar-title{
  font-family:'Cinzel',serif;
  font-size:13px;
  letter-spacing:0.2em;
  color:var(--gold);
  flex:1;
}
#toolbar-info{
  font-size:12px;
  color:#666;
  font-style:italic;
}
.btn-print{
  padding:9px 20px;
  background:var(--gold);
  color:#1a1a1a;
  border:none;
  border-radius:6px;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  letter-spacing:0.05em;
  transition:background 0.15s;
  display:flex;
  align-items:center;
  gap:8px;
}
.btn-print:hover{background:var(--gold-l)}
.btn-close{
  padding:9px 16px;
  background:transparent;
  color:#666;
  border:1px solid #333;
  border-radius:6px;
  font-size:13px;
  cursor:pointer;
  transition:all 0.15s;
}
.btn-close:hover{background:#252525;color:#aaa}
.btn-theme{padding:9px 14px;background:rgba(45,110,70,0.12);color:var(--gold);border:1px solid rgba(45,110,70,0.35);border-radius:6px;font-size:15px;cursor:pointer;transition:background 0.15s}
.btn-theme:hover{background:rgba(45,110,70,0.25)}

/* Loading */
#loading{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:60vh;gap:16px;
}
.loader{width:36px;height:36px;border:2px solid rgba(45,110,70,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite}
.loader-text{font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.3em;color:var(--gold-d)}
@keyframes spin{to{transform:rotate(360deg)}}

/* Conteneur des pages */
#pages{
  padding:24px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:24px;
}

/* ═══════════════════════════════
   PAGE A5 (148 × 210 mm)
═══════════════════════════════ */
.page{
  width:148mm;
  min-height:210mm;
  background:var(--dark2);
  position:relative;
  overflow:hidden;
  box-shadow:0 4px 24px rgba(0,0,0,0.5);
}

/* Bordure dorée + coins */
.page::before{
  content:'';position:absolute;inset:4mm;
  border:0.5px solid rgba(45,110,70,0.3);
  pointer-events:none;z-index:10;
}
.page::after{
  content:'';position:absolute;inset:4mm;
  background:
    linear-gradient(to bottom right,rgba(45,110,70,0.5) 10px,transparent 10px) top left/10px 10px no-repeat,
    linear-gradient(to bottom left, rgba(45,110,70,0.5) 10px,transparent 10px) top right/10px 10px no-repeat,
    linear-gradient(to top right,   rgba(45,110,70,0.5) 10px,transparent 10px) bottom left/10px 10px no-repeat,
    linear-gradient(to top left,    rgba(45,110,70,0.5) 10px,transparent 10px) bottom right/10px 10px no-repeat;
  pointer-events:none;z-index:10;
}

.page-inner{
  padding:10mm 9mm 8mm;
  min-height:210mm;
  display:flex;
  flex-direction:column;
  background-image:
    radial-gradient(ellipse at 20% 0%,rgba(90,55,15,0.2) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 100%,rgba(50,30,5,0.25) 0%,transparent 60%);
}
[data-theme="light"] .page-inner{
  background-image:
    radial-gradient(ellipse at 20% 0%,rgba(45,110,70,0.07) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 100%,rgba(45,110,70,0.05) 0%,transparent 60%);
}
[data-theme="light"] .p-sec-title{background:var(--dark2)}
[data-theme="light"] .cover-ornament{opacity:0.3}

/* ═══════════════════════════════
   COUVERTURE
═══════════════════════════════ */
.cover{
  flex:1;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;gap:0;
}
.cover-ornament{width:70mm;opacity:0.45;margin:6mm 0}
.cover-name{
  font-family:'Cinzel',serif;font-size:24pt;
  letter-spacing:0.2em;color:var(--gold-l);line-height:1;
}
.cover-sub{
  font-family:'Cinzel',serif;font-size:7pt;
  letter-spacing:0.6em;color:var(--gold);margin-top:2mm;
}
.cover-rule{
  width:28mm;height:0.5px;
  background:linear-gradient(to right,transparent,var(--gold),transparent);
  margin:5mm auto;
}
.cover-tagline{
  font-family:'EB Garamond',serif;font-style:italic;
  font-size:9pt;color:var(--muted);letter-spacing:0.05em;
}

/* ═══════════════════════════════
   CONTENU — typographie
═══════════════════════════════ */
.p-sec{
  text-align:center;margin:4mm 0 3mm;position:relative;
}
.p-sec-line{
  position:absolute;top:50%;left:0;right:0;
  height:0.5px;background:rgba(45,110,70,0.3);
}
.p-sec-title{
  font-family:'Cinzel',serif;font-size:13pt;letter-spacing:0.3em;font-weight: bold;
  color:var(--gold);background:var(--dark2);
  padding:0 8px;position:relative;z-index:1;text-transform:uppercase;
}

.p-item{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:1.8mm 0;border-bottom:0.5px solid rgba(45,110,70,0.1);gap:6mm;
}
.p-item-name{font-size:8.5pt;color:var(--cream);flex:1;line-height:1.3}
.p-item-desc{font-size:7pt;color:var(--muted);font-style:italic;margin-top:0.5mm}
.p-price{
  font-family:'Playfair Display',serif;font-size:8pt;
  color:var(--gold-l);white-space:nowrap;text-align:right;
}

.p-col-header{
  display:flex;justify-content:flex-end;gap:16px;
  margin-bottom:2mm;border-bottom:0.5px solid rgba(45,110,70,0.2);padding-bottom:1mm;
}
.p-col-header span{
  font-family:'Cinzel',serif;font-size:6pt;letter-spacing:0.2em;
  color:var(--gold-d);min-width:40px;text-align:center;
}
.p-prices2{display:flex;gap:16px}
.p-prices2 span{
  font-family:'Playfair Display',serif;font-size:8pt;
  color:var(--gold-l);min-width:40px;text-align:center;
}
.p-ardoise{font-style:italic;font-size:7pt;color:var(--muted)}

.p-sub-label{
  font-size:9pt;color:var(--gold-d);font-style:italic;margin:2.5mm 0 1mm;
}

.p-formule{
  border:0.5px solid rgba(45,110,70,0.35);border-radius:2mm;
  padding:2mm 3mm;margin:2mm 0;
  display:flex;justify-content:space-between;align-items:center;
}
.p-formule-name{font-family:'Playfair Display',serif;font-style:italic;font-size:9pt;color:var(--gold-l)}
.p-formule-detail{font-size:7pt;color:var(--muted);font-style:italic;margin-top:0.5mm}
.p-formule-price{font-family:'Cinzel',serif;font-size:11pt;color:var(--gold);white-space:nowrap}

.p-hr{
  height:0.5px;
  background:linear-gradient(to right,transparent,rgba(45,110,70,0.25),transparent);
  margin:3mm 0;
}

.p-footer{
  margin-top:auto;padding-top:3mm;
  border-top:0.5px solid rgba(45,110,70,0.2);
  text-align:center;
}
.p-footer p{font-size:6pt;color:var(--muted);font-style:italic;line-height:1.8;opacity:0.8}

/* ═══════════════════════════════
   IMPRESSION
═══════════════════════════════ */
@media print{
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  body{background:none}
  #toolbar{display:none}
  #pages{padding:0;gap:0}
  #loading{display:none}
  .page{
    width:148mm;min-height:210mm;
    box-shadow:none;
    page-break-after:always;
    break-after:page;
  }
  .page:last-child{page-break-after:avoid;break-after:avoid}
  @page{size:A5 portrait;margin:0}
}
</style>
</head>
<body>

<div id="toolbar">
  <div id="toolbar-title">Le Chalet Bar — Carte à imprimer</div>
  <div id="toolbar-info"></div>
  <button class="btn-theme" id="theme-toggle" onclick="toggleTheme()" title="Changer de thème">🌙</button>
  <button class="btn-close" onclick="window.close()">✕ Fermer</button>
  <button class="btn-print" onclick="window.print()">🖨 Imprimer</button>
</div>

<div id="loading">
  <div class="loader"></div>
  <div class="loader-text">Génération de la carte…</div>
</div>

<div id="pages"></div>

<script>
const RAW = 'https://raw.githubusercontent.com/DarkUltraPSP/lechaletcarteboissons/main/menu.json';

function esc(s){ const d=document.createElement('div'); d.textContent=s??''; return d.innerHTML; }

function fmt(p, display){
  if(display==='ardoise') return '<span class="p-ardoise">ardoise</span>';
  if(display==='none') return '';
  if(p===null||p===undefined) return '<span class="p-ardoise">ardoise</span>';
  return parseFloat(p).toFixed(2).replace('.',',')+'\u00a0€';
}

function sec(label){
  return `<div class="p-sec"><div class="p-sec-line"></div><span class="p-sec-title">${esc(label)}</span></div>`;
}
function hr(){ return '<div class="p-hr"></div>'; }

function itemSimple(i){
  return `<div class="p-item">
    <div class="p-item-name">${esc(i.name)}${i.desc?`<div class="p-item-desc">${esc(i.desc)}</div>`:''}</div>
    <div class="p-price">${fmt(i.price,i.price_display)}</div>
  </div>`;
}

function itemDouble(i, cat){
  const p1 = i.price1!=null ? fmt(i.price1) : '<span class="p-ardoise">ardoise</span>';
  const p2 = i.price2!=null ? fmt(i.price2) : '';
  return `<div class="p-item">
    <div class="p-item-name">${esc(i.name)}</div>
    <div class="p-prices2"><span>${p1}</span><span>${p2}</span></div>
  </div>`;
}

function renderCatContent(cat){
  let h = '';
  if(cat.type==='simple'){
    if(cat.subsections){
      cat.subsections.forEach(sub=>{
        h += `<div class="p-sub-label">${esc(sub.label)}</div>`;
        sub.items.filter(i=>i.active).forEach(i=>{ h += itemSimple(i); });
      });
    } else {
      (cat.items||[]).filter(i=>i.active).forEach(i=>{ h += itemSimple(i); });
    }
  } else if(cat.type==='double_prix'){
    h += `<div class="p-col-header"><span>${esc(cat.col1||'')}</span><span>${esc(cat.col2||'')}</span></div>`;
    (cat.items||[]).filter(i=>i.active).forEach(i=>{ h += itemDouble(i,cat); });
  } else if(cat.type==='formule'){
    (cat.items||[]).filter(i=>i.active).forEach(i=>{
      h += `<div class="p-formule">
        <div><div class="p-formule-name">${esc(i.name)}</div>${i.desc?`<div class="p-formule-detail">${esc(i.desc)}</div>`:''}</div>
        <div class="p-formule-price">${fmt(i.price,i.price_display)}</div>
      </div>`;
    });
  }
  return h;
}

function makePage(content){
  return `<div class="page"><div class="page-inner">${content}</div></div>`;
}

// Découpage intelligent des catégories en pages
// Chaque page fait ~170mm de contenu utile (210 - marges - bordures - footer)
// On estime la hauteur de chaque bloc et on coupe si ça dépasse
const CAT_HEIGHTS = {
  sec: 10,      // titre de section (mm)
  sub_label: 7, // sous-titre
  item: 7,      // ligne article
  item_desc: 3, // bonus si l'article a une description
  formule: 13,  // encart formule
  hr: 7,        // séparateur
  col_header: 6,
};
const PAGE_HEIGHT = 160; // mm disponibles par page (hors couverture et footer)
const FOOTER_H = 14;

function estimateHeight(cat){
  let h = CAT_HEIGHTS.sec;
  const itemH = i => CAT_HEIGHTS.item + (i.desc ? CAT_HEIGHTS.item_desc : 0);
  if(cat.type==='simple'){
    if(cat.subsections){
      cat.subsections.forEach(sub=>{
        h += CAT_HEIGHTS.sub_label;
        sub.items.filter(i=>i.active).forEach(i=>{ h += itemH(i); });
      });
    } else {
      (cat.items||[]).filter(i=>i.active).forEach(i=>{ h += itemH(i); });
    }
  } else if(cat.type==='double_prix'){
    h += CAT_HEIGHTS.col_header;
    (cat.items||[]).filter(i=>i.active).forEach(i=>{ h += itemH(i); });
  } else if(cat.type==='formule'){
    (cat.items||[]).filter(i=>i.active).forEach(i=>{ h += CAT_HEIGHTS.formule + (i.desc ? CAT_HEIGHTS.item_desc : 0); });
  }
  return h;
}

          </a>
          <div style="width:0.4px;height:10mm;background:rgba(45,110,70,0.3)"></div>
          <a href="https://www.facebook.com/p/Le-Chalet-61576979939921/" style="display:flex;flex-direction:column;align-items:center;gap:1.5mm;text-decoration:none;color:var(--gold)">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
            <span style="font-family:'EB Garamond',serif;font-size:8pt;letter-spacing:0.05em">Le Chalet</span>
          </a>
        </div>

      </div>
    `;
    pages.push(makePage(`
      <div class="cover">
        <div class="cover-ornament">${ornement}</div>
        ${logoSVG}
        ${coverInfo}
        <div class="cover-ornament" style="margin-top:5mm">${ornement}</div>
      </div>
    `));

    // Pages suivantes : contenu découpé
    let currentContent = '';
    let currentH = 0;
    let firstOnPage = true;

    function flushPage(){
      if(!currentContent.trim()) return;
      pages.push(makePage(`
        ${currentContent}
        <div class="p-footer">
          <p>Prix nets, service compris</p>
          <p>L'abus d'alcool est dangereux pour la santé — À consommer avec modération</p>
        </div>
      `));
      currentContent = '';
      currentH = FOOTER_H;
      firstOnPage = true;
    }

    currentH = FOOTER_H;

    cats.forEach((cat, idx) => {
      const catH = estimateHeight(cat) + (firstOnPage ? 0 : CAT_HEIGHTS.hr);

      // Si la catégorie ne rentre pas dans la page courante → nouvelle page
      if(!firstOnPage && currentH + catH > PAGE_HEIGHT){
        flushPage();
      }

      if(!firstOnPage){
        currentContent += hr();
        currentH += CAT_HEIGHTS.hr;
      }

      currentContent += sec(cat.label);
      currentContent += renderCatContent(cat);
      currentH += estimateHeight(cat);
      firstOnPage = false;
    });

    flushPage();

    // Dernière page : page de fermeture (optionnel)
    pages.push(makePage(`
      <div class="cover">
        <div class="cover-ornament">${ornement}</div>
        ${logoSVG}

        <div class="cover-ornament" style="margin-top:8mm">${ornement}</div>
        <div style="font-family:'EB Garamond',serif;font-style:italic;font-size:20pt;color:var(--gold);margin-top:6mm">Pour vos soirées privées, voir avec Alexis</div>
        <div style="font-size:7pt;color:rgba(138,115,85,0.5);margin-top:4mm;font-style:italic">Prix nets, service compris</div>
      </div>
    `));

    document.getElementById('pages').innerHTML = pages.join('');
    document.getElementById('loading').style.display = 'none';
    document.getElementById('toolbar-info').textContent = `${pages.length} pages · Format A5`;

  }catch(e){
    document.getElementById('loading').innerHTML = '<div style="color:#8A7355;font-family:Cinzel,serif;font-size:11px;letter-spacing:0.2em;text-align:center">ERREUR DE CHARGEMENT</div>';
  }
}

function toggleTheme(){
  const html=document.documentElement;
  const next=html.dataset.theme==='dark'?'light':'dark';
  html.dataset.theme=next;
  document.getElementById('theme-toggle').textContent=next==='dark'?'🌙':'☀️';
  localStorage.setItem('chalet_theme',next);
}
(function(){
  const t=localStorage.getItem('chalet_theme')||'dark';
  document.documentElement.dataset.theme=t;
  document.getElementById('theme-toggle').textContent=t==='dark'?'🌙':'☀️';
})();
load();
</script>
</body>
